<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Miejscówek</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box;}
body{margin:0;font-family:'Inter',sans-serif;background:#f8fafc;}
#map{height:100vh;}

.fab{
position:absolute;
bottom:5%;
left:5%;

width:65px;
height:65px;
border-radius:50%;
border:none;
font-size:30px;
background:linear-gradient(135deg,#f59e0b,#ef4444);
color:white;
cursor:pointer;
box-shadow:0 8px 25px rgba(0,0,0,0.25);
z-index:1100;
}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.3);
display:none;
z-index:1000;
}

.panel{
position:absolute;
bottom:-100%;
left:50%;
transform:translateX(-50%);
width:95%;
max-width:420px;
padding:20px;
border-radius:20px 20px 0 0;
background:white;
transition:0.4s;
z-index:1200;
box-shadow:0 -5px 30px rgba(0,0,0,0.15);
}

.panel.active{bottom:0;}

input,select{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:12px;
border:1px solid #e2e8f0;
font-size:16px;
}

button.submit{
width:100%;
padding:12px;
border-radius:12px;
border:none;
font-weight:600;
cursor:pointer;
background:linear-gradient(135deg,#f59e0b,#ef4444);
color:white;
}

.close-btn{text-align:right;cursor:pointer;opacity:0.6;margin-bottom:10px;}

.infoPanel{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
width:92%;
max-width:420px;
background:white;
padding:18px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
display:none;
z-index:1200;
}

.infoPanel.active{display:block;}

.infoHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:8px;
}

.risk span{
font-size:26px;
cursor:pointer;
opacity:0.3;
}

.risk span.active{opacity:1;}

.rating span{
font-size:26px;
}

.userRating span{
font-size:18px;
cursor:pointer;
opacity:0.3;
}

.userRating span.active{
opacity:1;
}

.ratingLabel{
font-size:12px;
opacity:0.6;
margin-top:6px;
}

.avgRatingRow{
display:flex;
align-items:center;
gap:8px;
margin-bottom:10px;
flex-wrap:wrap;
}

.toggleRow{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:10px;
font-weight:600;
}

.switch{
position:relative;
display:inline-block;
width:60px;
height:30px;
}

.switch input{
opacity:0;
width:0;
height:0;
}

.sliderToggle{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#22c55e;
transition:.3s;
border-radius:30px;
}

.sliderToggle:before{
position:absolute;
content:"";
height:24px;
width:24px;
left:3px;
bottom:3px;
background:white;
transition:.3s;
border-radius:50%;
}

input:checked + .sliderToggle{
background:#ef4444;
}

input:checked + .sliderToggle:before{
transform:translateX(30px);
}

</style>
</head>

<body>

<div id="map"></div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>

<div class="panel" id="panel">

<div class="close-btn" onclick="closePanel()">✖ Zamknij</div>

<h2>Dodaj miejscówkę</h2>

<select id="type">
<option value="plener">🍾 Plener</option>
<option value="pub">🍻 Pub</option>
<option value="club">🍸 Klub</option>
</select>

<input id="nameInput" placeholder="Nazwa miejsca">
<input id="descInput" placeholder="Opis">

<div id="legalToggle">
<div class="toggleRow">
<span id="toggleLabel">✅ Legalna</span>

<label class="switch">
<input type="checkbox" id="illegalToggle">
<span class="sliderToggle"></span>
</label>
</div>
</div>

<div id="riskBox">
<p>Poziom przypału</p>
<div class="risk" id="riskIcons">
<span>🚨</span><span>🚨</span><span>🚨</span><span>🚨</span><span>🚨</span>
</div>
</div>

<button class="submit" id="startAdd">Wybierz punkt na mapie</button>

</div>

<button class="fab" onclick="openPanel()">＋</button>

<div class="infoPanel" id="infoPanel">

<div class="infoHeader">
<b id="infoName"></b>
<span onclick="closeInfo()">✖</span>
</div>

<p id="infoType"></p>
<p id="infoDesc"></p>
<p id="infoRisk"></p>

<div class="avgRatingRow">
<span>Średnia ocen:</span>
<div class="rating" id="avgStars"></div>
<span id="ratingStats"></span>
</div>

<p class="ratingLabel">Twoja ocena</p>

<div class="userRating" id="userStars">
<span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span><span>⭐</span>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

const firebaseConfig = {
apiKey: "AIza...",
authDomain: "mapa-miejscowek.firebaseapp.com",
projectId: "mapa-miejscowek",
storageBucket: "mapa-miejscowek.appspot.com",
messagingSenderId: "95333779353",
appId: "1:95333779353:web:69e97f3b5aa3f98fa6f508"
}

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)

const map=L.map('map').setView([52.2,19.2],6)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map)

let adding=false
let riskLevel=1
let currentSpot=null

window.openPanel=()=>{panel.classList.add("active");overlay.style.display="block"}
window.closePanel=()=>{panel.classList.remove("active");overlay.style.display="none"}
window.closeInfo=()=>{infoPanel.classList.remove("active")}

const riskIcons=document.querySelectorAll("#riskIcons span")

riskIcons.forEach((icon,i)=>{
icon.onclick=()=>{
riskLevel=i+1
riskIcons.forEach(x=>x.classList.remove("active"))
for(let j=0;j<riskLevel;j++){riskIcons[j].classList.add("active")}
}
})

const typeSelect=document.getElementById("type")
const illegalToggle=document.getElementById("illegalToggle")
const toggleLabel=document.getElementById("toggleLabel")
const riskBox=document.getElementById("riskBox")
const legalToggle=document.getElementById("legalToggle")

function updateUI(){

if(typeSelect.value==="plener"){

legalToggle.style.display="block"

if(illegalToggle.checked){
toggleLabel.innerText="🚨 Przypał"
riskBox.style.display="block"
}else{
toggleLabel.innerText="✅ Legalna"
riskBox.style.display="none"
}

}else{

legalToggle.style.display="none"
riskBox.style.display="none"

}

}

illegalToggle.addEventListener("change",updateUI)
typeSelect.addEventListener("change",updateUI)

updateUI()

document.getElementById("startAdd").onclick=()=>{
const name=document.getElementById("nameInput").value
if(!name){alert("Podaj nazwę miejsca");return}
adding=true
closePanel()
alert("Kliknij miejsce na mapie")
}

function getEmoji(type){
if(type==="plener") return "🍾"
if(type==="pub") return "🍻"
if(type==="club") return "🍸"
}

function createMarker(data){

const icon=L.divIcon({
html:`<div style="font-size:28px">${getEmoji(data.type)}</div>`,
className:""
})

const marker=L.marker([data.lat,data.lng],{icon}).addTo(map)

marker.on("click",()=>{

currentSpot=data

infoPanel.classList.add("active")

infoName.innerText=data.name
infoType.innerText="Typ: "+data.type
infoDesc.innerText=data.desc

map.flyTo([data.lat +0.001,data.lng],17)

if(data.type==="plener"){

if(data.illegal){

let riskHTML="Przypał: "
for(let i=0;i<5;i++){
riskHTML+=i<data.risk?"🚨":'<span style="opacity:0.3">🚨</span>'
}

infoRisk.innerHTML=riskHTML

}else{

infoRisk.innerHTML="✅ Legalna miejscówka"

}

}else{

infoRisk.innerHTML=""

}

updateRatingDisplay()

})

}

map.on("click",async(e)=>{

if(!adding) return

const type=typeSelect.value
const isIllegal = type==="plener" && illegalToggle.checked

const data={
lat:e.latlng.lat,
lng:e.latlng.lng,
name:nameInput.value,
desc:descInput.value,
type:type,
illegal:isIllegal,
risk:isIllegal ? riskLevel : 0,
ratingSum:0,
ratingCount:0
}

const docRef=await addDoc(collection(db,"spots"),data)
data.id=docRef.id

createMarker(data)

adding=false

})

async function loadMarkers(){

const querySnapshot=await getDocs(collection(db,"spots"))

querySnapshot.forEach((docSnap)=>{
const data=docSnap.data()
data.id=docSnap.id
createMarker(data)
})

}

loadMarkers()

const userStars=document.querySelectorAll("#userStars span")

userStars.forEach((star,i)=>{

star.onclick=async()=>{

if(!currentSpot) return

let userRatings=JSON.parse(localStorage.getItem("ratings")||"{}")

if(userRatings[currentSpot.id]){
alert("Już oceniłeś to miejsce")
return
}

const rating=i+1

currentSpot.ratingSum+=rating
currentSpot.ratingCount+=1

await updateDoc(doc(db,"spots",currentSpot.id),{
ratingSum:currentSpot.ratingSum,
ratingCount:currentSpot.ratingCount
})

userRatings[currentSpot.id]=rating
localStorage.setItem("ratings",JSON.stringify(userRatings))

updateRatingDisplay()

}

})

function updateRatingDisplay(){

if(!currentSpot) return

const avg=currentSpot.ratingCount
? (currentSpot.ratingSum/currentSpot.ratingCount)
:0

const avgStars=document.getElementById("avgStars")
avgStars.innerHTML=""

for(let i=0;i<5;i++){
avgStars.innerHTML+= i<Math.round(avg)?"⭐":"☆"
}

ratingStats.innerText=`${avg.toFixed(1)} / 5 (${currentSpot.ratingCount} ocen)`

let userRatings=JSON.parse(localStorage.getItem("ratings")||"{}")

userStars.forEach((s,i)=>{
s.classList.remove("active")
if(userRatings[currentSpot.id] && i<userRatings[currentSpot.id]){
s.classList.add("active")
}
})

}

</script>

</body>
</html>
