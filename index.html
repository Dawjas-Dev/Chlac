<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, deleteDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"

// 1. BEZPIECZNY LOCALSTORAGE (Kluczowe dla App Inventora)
function safeStorageGet(key, defaultValue) {
    try { return localStorage.getItem(key) || defaultValue; }
    catch (e) { return defaultValue; }
}
function safeStorageSet(key, value) {
    try { localStorage.setItem(key, value); }
    catch (e) { console.warn("LocalStorage zablokowany w WebView"); }
}

// 2. NAJPIERW ŁADUJEMY MAPĘ (aby zawsze się pokazała)
const savedLat = parseFloat(safeStorageGet('map_lat', 52.2));
const savedLng = parseFloat(safeStorageGet('map_lng', 19.2));
const savedZoom = parseInt(safeStorageGet('map_zoom', 6));

const map = L.map('map', { zoomControl: false }).setView([savedLat, savedLng], savedZoom);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

map.on('moveend', () => {
    const center = map.getCenter();
    safeStorageSet('map_lat', center.lat);
    safeStorageSet('map_lng', center.lng);
    safeStorageSet('map_zoom', map.getZoom());
});

// 3. INICJALIZACJA UŻYTKOWNIKA
let myUid = safeStorageGet('my_uid', '');
if (!myUid) { 
    myUid = 'user_' + Math.random().toString(36).substring(2, 15); 
    safeStorageSet('my_uid', myUid); 
}

// 4. FIREBASE CONFIG (Tu wpisz swój prawdziwy klucz apiKey)
const firebaseConfig = { 
    apiKey: "AIza...", // <-- UZUPEŁNIJ TO!
    authDomain: "mapa-miejscowek.firebaseapp.com", 
    projectId: "mapa-miejscowek", 
    storageBucket: "mapa-miejscowek.appspot.com", 
    messagingSenderId: "95333779353", 
    appId: "1:95333779353:web:69e97f3b5aa3f98fa6f508" 
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let adding = false, riskLevel = 1, currentSpot = null, userMarker = null;
let allSpots = []; 
let spotMarkers = {}; 
let userPos = null;
let reportTarget = { type: null, id: null };

// --- SYSTEM OPTYMALIZACJI ---
async function updateGlobalDataVersion() {
    const newVersion = Date.now().toString();
    await setDoc(doc(db, "system", "version"), { v: newVersion });
    safeStorageSet('spots_version', newVersion);
}

async function loadSpotsOptimized() {
    let cachedSpots = [];
    try { cachedSpots = JSON.parse(safeStorageGet('spots_cache', "[]")); } catch(e){}
    const localVersion = safeStorageGet('spots_version', "0");
    
    if (cachedSpots.length > 0) {
        cachedSpots.forEach(data => {
            allSpots.push(data);
            createMarker(data);
        });
    }

    try {
        const verSnap = await getDoc(doc(db, "system", "version"));
        let remoteVersion = "0";
        if (verSnap.exists()) {
            remoteVersion = verSnap.data().v.toString();
        } else {
            await setDoc(doc(db, "system", "version"), { v: Date.now().toString() });
        }

        if (remoteVersion !== localVersion || cachedSpots.length === 0) {
            const snap = await getDocs(collection(db, "spots"));
            
            Object.values(spotMarkers).forEach(m => map.removeLayer(m));
            spotMarkers = {};
            allSpots = [];

            snap.forEach(d => {
                const data = { ...d.data(), id: d.id };
                allSpots.push(data);
                createMarker(data);
            });

            safeStorageSet('spots_cache', JSON.stringify(allSpots));
            safeStorageSet('spots_version', remoteVersion);
        }
    } catch(e) { console.warn("Praca offline lub błąd sprawdzania wersji:", e); }
}

loadSpotsOptimized();

// --- FUNKCJE INTERFEJSU PRZYPISYWANE DO WINDOW ---
window.closeAll = () => {
    document.querySelectorAll('.bottom-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.center-modal').forEach(m => m.classList.remove('active'));
    document.getElementById('overlay').style.display = "none";
};

window.openHelpPanel = () => { closeAll(); document.getElementById('overlay').style.display = "block"; document.getElementById('helpPanel').classList.add('active'); };

window.openReportModal = (type, targetId) => {
    let reportedItems = [];
    try { reportedItems = JSON.parse(safeStorageGet('my_reports', "[]")); } catch(e){}
    
    if(reportedItems.includes(targetId)) { alert("Już zgłosiłeś ten element. Dziękujemy!"); return; }

    closeAll();
    reportTarget = { type, id: targetId };
    document.getElementById('overlay').style.display = "block";
    document.getElementById('reportPanel').classList.add('active');
};

window.submitReport = async () => {
    const reason = document.getElementById('reportReason').value;
    const reportData = { type: reportTarget.type, targetId: reportTarget.id, reason: reason, reportedBy: myUid, timestamp: new Date().toISOString() };
    await addDoc(collection(db, "reports"), reportData);

    let reportedItems = [];
    try { reportedItems = JSON.parse(safeStorageGet('my_reports', "[]")); } catch(e){}
    reportedItems.push(reportTarget.id);
    safeStorageSet('my_reports', JSON.stringify(reportedItems));

    closeAll();
    alert("Zgłoszenie wysłane. Dziękujemy za pomoc!");
};

window.openAddPanel = () => { closeAll(); document.getElementById('addPanel').classList.add('active'); document.getElementById('overlay').style.display="block"; window.togglePlenerUI(); };

window.togglePlenerUI = () => { document.getElementById('plenerExtras').style.display = (document.getElementById('type').value === "plener") ? "block" : "none"; };

window.updateToggleUI = () => {
    const isIllegal = document.getElementById('illegalToggle').checked;
    document.getElementById('toggleLabel').innerText = isIllegal ? "🚨 Przypał" : "✅ Legalna";
    document.getElementById('riskBox').style.display = isIllegal ? "block" : "none";
};

window.locateUser = () => map.locate({setView: true, maxZoom: 16});

map.on('locationfound', (e) => {
    userPos = e.latlng;
    if(!userMarker) userMarker = L.marker(e.latlng, {icon: L.divIcon({className:'user-location-dot'})}).addTo(map);
    else userMarker.setLatLng(e.latlng);
});

const riskIcons = document.querySelectorAll("#riskIcons span");
riskIcons.forEach((s, i) => { s.onclick = () => { riskLevel = i + 1; riskIcons.forEach((el, idx) => el.classList.toggle('active', idx < riskLevel)); }; });

document.getElementById('startAdd').onclick = () => {
    if(!document.getElementById('nameInput').value) return alert("Podaj nazwę!");
    adding = true; closeAll(); 
    document.getElementById('modernAlert').classList.add('show');
};

map.on('click', async (e) => {
    if(!adding) { closeAll(); return; }
    
    document.getElementById('modernAlert').classList.remove('show');

    const type = document.getElementById('type').value;
    const isIllegal = type === "plener" && document.getElementById('illegalToggle').checked;
    
    const data = {
        lat: e.latlng.lat, lng: e.latlng.lng,
        name: document.getElementById('nameInput').value, desc: document.getElementById('descInput').value,
        type: type, illegal: isIllegal, risk: isIllegal ? riskLevel : 0,
        ratingSum: 0, ratingCount: 0, creatorId: myUid, comments: []
    };
    
    const docRef = await addDoc(collection(db, "spots"), data);
    data.id = docRef.id;
    
    createMarker(data);
    allSpots.push(data); 
    
    safeStorageSet('spots_cache', JSON.stringify(allSpots));
    updateGlobalDataVersion();

    adding = false;
});

function createMarker(data) {
    const marker = L.marker([data.lat, data.lng], {
        icon: L.divIcon({ html: `<div style="font-size:25px">${getEmoji(data.type)}</div>`, className:''})
    }).addTo(map);
    
    spotMarkers[data.id] = marker;
    marker.on('click', () => showSpotDetails(data));
}

function showSpotDetails(data) {
    currentSpot = data;
    closeAll(); 
    
    const offset = window.innerWidth < 600 ? 0.002 : 0.002; 
    map.flyTo([data.lat - offset, data.lng], 16);
    
    document.getElementById('infoName').innerText = data.name;
    document.getElementById('infoEmoji').innerText = getEmoji(data.type);
    document.getElementById('infoDesc').innerText = data.desc;
    
    document.getElementById('reportSpotBtn').onclick = () => window.openReportModal('spot', data.id);
    
    const riskDiv = document.getElementById('infoRisk');
    if(data.illegal) {
        let sirensHTML = "";
        for(let i = 0; i < 5; i++) {
            const opacity = i < data.risk ? "1" : "0.2";
            sirensHTML += `<span style="font-size: 20px; opacity: ${opacity}; margin-right: 2px;">🚨</span>`;
        }
        
        let riskColor = "#ef4444";
        if(data.risk <= 2) riskColor = "#166534"; 
        else if(data.risk <= 4) riskColor = "#eab308"; 

        riskDiv.innerHTML = `<span style="color: ${riskColor}; margin-right: 8px;">Przypał:</span> <div style="display:flex;">${sirensHTML}</div>`;
    } else {
        riskDiv.innerHTML = data.type === "plener" ? "✅ Legalna miejscówka" : "";
        riskDiv.style.color = "#22c55e";
    }
    
    updateStarsUI();
    renderComments();
    
    document.getElementById('deleteSpotBtn').style.display = (currentSpot.creatorId === myUid) ? "block" : "none";
    document.getElementById('infoPanel').classList.add('active');
}

function renderComments() {
    const list = document.getElementById('commentsList');
    list.innerHTML = "";
    
    const comments = currentSpot.comments || [];
    if(comments.length === 0) { list.innerHTML = "<div style='color:#94a3b8; font-size:13px;'>Brak komentarzy. Bądź pierwszy!</div>"; return; }
    
    comments.forEach(c => {
        const cDiv = document.createElement('div');
        cDiv.className = "comment-box";
        
        const textSpan = document.createElement('span');
        textSpan.innerText = c.text;
        textSpan.style.flex = "1";
        cDiv.appendChild(textSpan);
        
        if(c.creatorId === myUid) {
            const delIcon = document.createElement('span');
            delIcon.className = "action-icon"; delIcon.innerText = "🗑️"; delIcon.title = "Usuń komentarz";
            delIcon.style.marginLeft = "10px";
            delIcon.onclick = () => window.deleteComment(c.id);
            cDiv.appendChild(delIcon);
        } else {
            const reportIcon = document.createElement('span');
            reportIcon.className = "action-icon"; reportIcon.innerText = "⚠️"; reportIcon.title = "Zgłoś komentarz";
            reportIcon.style.marginLeft = "10px";
            reportIcon.onclick = () => window.openReportModal('comment', c.id);
            cDiv.appendChild(reportIcon);
        }
        
        list.appendChild(cDiv);
    });
}

window.addComment = async () => {
    const input = document.getElementById('newComment');
    const text = input.value.trim();
    if(!text) return;
    
    const comment = { id: Date.now().toString(), text: text, creatorId: myUid };
    const updatedComments = [...(currentSpot.comments || []), comment];
    
    await updateDoc(doc(db, "spots", currentSpot.id), { comments: updatedComments });
    
    currentSpot.comments = updatedComments;
    input.value = "";
    renderComments();
    
    const idx = allSpots.findIndex(x => x.id === currentSpot.id);
    if(idx !== -1) allSpots[idx].comments = updatedComments;
    
    safeStorageSet('spots_cache', JSON.stringify(allSpots));
    updateGlobalDataVersion();
};

window.deleteComment = async (commentId) => {
    if(!confirm("Usunąć ten komentarz?")) return;
    const updatedComments = currentSpot.comments.filter(c => c.id !== commentId);
    await updateDoc(doc(db, "spots", currentSpot.id), { comments: updatedComments });
    currentSpot.comments = updatedComments;
    renderComments();
    
    const idx = allSpots.findIndex(x => x.id === currentSpot.id);
    if(idx !== -1) allSpots[idx].comments = updatedComments;

    safeStorageSet('spots_cache', JSON.stringify(allSpots));
    updateGlobalDataVersion();
};

window.deleteSpot = async () => {
    if(!confirm("Na pewno chcesz całkowicie usunąć tę miejscówkę?")) return;
    await deleteDoc(doc(db, "spots", currentSpot.id));
    
    if(spotMarkers[currentSpot.id]) { map.removeLayer(spotMarkers[currentSpot.id]); delete spotMarkers[currentSpot.id]; }
    allSpots = allSpots.filter(s => s.id !== currentSpot.id);
    closeAll();

    safeStorageSet('spots_cache', JSON.stringify(allSpots));
    updateGlobalDataVersion();
};

function getEmoji(t) { return t==="plener"?"🍾":t==="pub"?"🍻":"🍸"; }

const userStars = document.querySelectorAll("#userStars span");
userStars.forEach((s, i) => {
    s.onclick = async () => {
        let ratings = {};
        try { ratings = JSON.parse(safeStorageGet('my_ratings', "{}")); } catch(e){}
        if(ratings[currentSpot.id]) return alert("Już oceniono!");
        
        const val = i + 1;
        currentSpot.ratingSum += val; currentSpot.ratingCount += 1;
        
        const idx = allSpots.findIndex(x => x.id === currentSpot.id);
        if(idx !== -1) allSpots[idx] = currentSpot;

        await updateDoc(doc(db, "spots", currentSpot.id), { ratingSum: currentSpot.ratingSum, ratingCount: currentSpot.ratingCount });
        ratings[currentSpot.id] = val;
        safeStorageSet('my_ratings', JSON.stringify(ratings));
        updateStarsUI();

        safeStorageSet('spots_cache', JSON.stringify(allSpots));
        updateGlobalDataVersion();
    };
});

function updateStarsUI() {
    const avg = currentSpot.ratingCount ? (currentSpot.ratingSum / currentSpot.ratingCount) : 0;
    const avgStarsDiv = document.getElementById('avgStars');
    avgStarsDiv.innerHTML = "";
    for(let i=0; i<5; i++) {
        const star = document.createElement('span'); star.innerText = "★";
        star.className = i < Math.round(avg) ? "filled" : "empty";
        avgStarsDiv.appendChild(star);
    }
    document.getElementById('ratingStats').innerText = `${avg.toFixed(1)}/5 (${currentSpot.ratingCount})`;
    
    let myRating = 0;
    try { myRating = JSON.parse(safeStorageGet('my_ratings', "{}"))[currentSpot.id] || 0; } catch(e){}
    userStars.forEach((s, i) => { s.className = i < myRating ? "active" : "empty"; s.innerText = "★"; });
}

window.openRanking = () => {
    if(!userPos) { alert("Włącz lokalizację 📍"); return; }
    const list = document.getElementById('rankingList'); list.innerHTML = "";
    
    const nearby = allSpots.map(s => ({ ...s, dist: userPos.distanceTo(L.latLng(s.lat, s.lng)), score: s.ratingCount ? s.ratingSum/s.ratingCount : 0 }))
    .filter(s => s.dist <= 5000).sort((a,b) => b.score - a.score);

    if(nearby.length === 0) list.innerHTML = "<p style='text-align:center; color:#94a3b8; padding:20px;'>Brak miejscówek w promieniu 5 km.</p>";
    else {
        nearby.forEach(s => {
            const item = document.createElement('div'); item.className = 'ranking-item';
            item.innerHTML = `<strong>${getEmoji(s.type)} ${s.name}</strong><span style="font-size:13px; color:#64748b; margin-top:4px;">${s.score.toFixed(1)} ⭐ | ${(s.dist/1000).toFixed(1)} km stąd</span>`;
            item.onclick = () => showSpotDetails(s);
            list.appendChild(item);
        });
    }
    closeAll(); document.getElementById('rankingPanel').classList.add('active'); document.getElementById('overlay').style.display="block";
};
</script>
